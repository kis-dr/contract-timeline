<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종목 타임라인 - 공급계약 대시보드</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <a href="index.html" class="back-link">← 메인</a>
      <span class="brand-mark">◇</span>
      <span class="brand-name">Contract Timeline</span>
    </div>
    <div class="meta-strip" id="metaStrip">로딩중…</div>
  </div>
</header>

<main class="container stock-page">

  <!-- 종목 정보 헤더 -->
  <section class="stock-header" id="stockHeader">
    <div class="stock-title-row">
      <h1 class="stock-name" id="stockName">—</h1>
      <span class="stock-code" id="stockCode">—</span>
      <span class="stock-market" id="stockMarket">—</span>
    </div>
    <div class="stock-stats">
      <div class="stat-block">
        <div class="stat-label">현재가</div>
        <div class="stat-value mono" id="stockPrice">—</div>
        <div class="stat-sub" id="stockChange">—</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">시가총액</div>
        <div class="stat-value mono" id="stockMcap">—</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">52주 최고/최저</div>
        <div class="stat-value mono" id="stock52w">—</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">1년 수익률</div>
        <div class="stat-value mono" id="stockYoy">—</div>
      </div>
    </div>
  </section>

  <!-- 분기별 공급계약 금액 차트 -->
  <section class="chart-section" id="chartSection" hidden>
    <div class="chart-header">
      <h2 class="section-title">분기별 공급계약 금액</h2>
      <span class="chart-note" id="chartNote"></span>
    </div>
    <div class="chart-container" id="chartContainer"></div>
  </section>

  <!-- 공급계약 테이블 (비교용) -->
  <section class="stock-table-section" id="stockTableSection" hidden>
    <h2 class="section-title">공급계약 목록</h2>
    <div class="stock-table-wrap">
      <table class="stock-contract-table">
        <thead>
          <tr>
            <th>공시일</th>
            <th>계약내용</th>
            <th>계약상대</th>
            <th class="col-r">금액(억)</th>
            <th class="col-r">매출비중</th>
            <th>중요도</th>
            <th>원문</th>
          </tr>
        </thead>
        <tbody id="stockContractTbody"></tbody>
      </table>
    </div>
  </section>

  <!-- 타임라인 컨트롤 -->
  <section class="timeline-controls">
    <div class="control-left">
      <h2 class="section-title">공급계약 타임라인</h2>
      <span class="count-badge" id="contractCountBadge">0건</span>
    </div>
    <div class="control-right">
      <label class="filter-check">
        <input type="checkbox" id="dedupTimeline" checked>
        <span class="filter-check-text">최신 공시만</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="briefToggle">
        <span class="toggle-slider"></span>
        <span class="toggle-text">시점별 브리핑 보기</span>
      </label>
    </div>
  </section>

  <!-- 타임라인 본체 -->
  <section class="timeline-section">
    <div class="timeline" id="timeline"></div>
    <div id="timelineEmpty" class="empty-state" hidden>
      이 종목의 공급계약 데이터가 없습니다.
    </div>
  </section>

</main>

<footer class="footer">
  <div class="footer-inner">
    <span>자산관리전략부 디지털리서치팀</span>
    <span class="dot">·</span>
    <span id="footerUpdated">—</span>
  </div>
</footer>

<script src="assets/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => initStockPage());
</script>
</body>
</html>
